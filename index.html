<!DOCTYPE html>
<html>
<head>
  <title>For My Love ❤️</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: black;
    }

    /* Password background image */
    .password-bg {
      background: url("tia.jpg") no-repeat center center fixed;
      background-size: cover;
    }

    /* Video background */
    #bgVideo {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      opacity: 0;
      transition: opacity 2s ease;
    }

    /* MEMORY GAME */
    #memoryGame {
      text-align: center;
      color: white;
      padding-top: 40px;
    }

    .game-board {
      width: 420px;
      margin: auto;
      display: grid;
      grid-template-columns: repeat(4,1fr);
      gap: 10px;
    }

    .card {
  width: 100%;
  padding-top: 100%; /* makes the card a perfect square */
  position: relative; 
  border-radius: 10px;
  cursor: pointer;
  overflow: hidden;
  
}

.card img {
  position: absolute;
  top: -11%;
  left: -9%;
  width: 100%;
  height: 100%;
  object-fit: cover; /* fills the card completely */
}
  </style>
</head>

<body class="password-bg">

  <!-- Background video -->
  <video autoplay muted loop playsinline id="bgVideo">
    <source src="yahoo.mp4" type="video/mp4">
  </video>

  <!-- MEMORY GAME -->
  <div id="memoryGame">
    <h2 style="font-family: playfair display; font-size: 30px;" >Match Our Memories </h2>
    <div class="game-board" id="gameBoard"></div>
    <p id="gameMessage" style="display:none; font-size:22px; margin-top:20px;">
      You unlocked the password: <b>67</b> ⁶🤷🏻‍♀️⁷
    </p>
    <button id="continueBtn" style="display:none; padding:10px 20px; margin-top:10px;" onclick="showLogin()">
      Continue
    </button>
  </div>

  <!-- Password Box -->
  <div class="login-box" id="loginBox" style="display:none;">
    <h2>Enter Special Password </h2>
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkPassword()">Unlock</button>
    <p id="error"></p>
  </div>

  <!-- Letter Box -->
  <div class="letter" id="letterBox" style="display:none;">
    <h1>Happy 2nd Anniversary</h1>
    <p id="typewriter"></p>
    <div class="hearts"></div>
  </div>

  <!-- Background music -->
  <audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <script>
    // MEMORY GAME SCRIPT
    const images = [
      "pic1.jpg","pic1.jpg",
      "pic2.jpg","pic2.jpg",
      "pic3.jpg","pic3.jpg",
      "pic4.jpg","pic4.jpg"
    ];

    let shuffled = images.sort(() => 0.5 - Math.random());
    const board = document.getElementById("gameBoard");
    let first = null, second = null, lock = false, matches = 0;

    shuffled.forEach(img => {
      const card = document.createElement("div");
      card.className = "card";

      const image = document.createElement("img");
      image.src = "cover.png";

      card.dataset.img = img;

      card.onclick = () => {
        if(lock || card === first) return;
        image.src = img;

        if(!first) { first = card; return; }

        second = card;
        lock = true;

        if(first.dataset.img === second.dataset.img) {
          matches++;
          first = null;
          second = null;
          lock = false;
          if(matches === 4) {
            document.getElementById("gameMessage").style.display = "block";
            document.getElementById("continueBtn").style.display = "inline-block";
          }
        } else {
          setTimeout(() => {
            first.querySelector("img").src = "cover.png";
            second.querySelector("img").src = "cover.png";
            first = null;
            second = null;
            lock = false;
          },1000);
        }
      };

      card.appendChild(image);
      board.appendChild(card);
    });

    function showLogin(){
      document.getElementById("memoryGame").style.display = "none";
      document.getElementById("loginBox").style.display = "block";
    }

    // EXISTING PASSWORD FUNCTION
    function checkPassword() {
      const password = document.getElementById("password").value;
      const correctPassword = "67";
      const bgMusic = document.getElementById("bgMusic");

      const wrongMessages = [
        "12345**???",
        "⁶🤷🏻‍♀️⁷",
        "70-3=?",
        "one more mistake u givin me 1k"
      ];

      if (password === correctPassword) {

        if (bgMusic) bgMusic.play().catch(e => console.log("Music blocked:", e));

        const bgVideo = document.getElementById("bgVideo");

        // Remove image background
        document.body.classList.remove("password-bg");

        // Start video
        bgVideo.play().catch(e => console.log("Video blocked:", e));

        // Fade video in smoothly
        setTimeout(() => {
          bgVideo.style.opacity = "1";
        }, 200);

        const loginBox = document.getElementById("loginBox");
        loginBox.classList.add("fade-out");

        setTimeout(() => {
          loginBox.style.display = "none";
          const letterBox = document.getElementById("letterBox");
          letterBox.style.display = "block";
          letterBox.classList.add("fadeIn");
          startEffects();
        }, 1000);

      } else {
        const randomIndex = Math.floor(Math.random() * wrongMessages.length);
        document.getElementById("error").innerText = wrongMessages[randomIndex];
      }
    }

    // EXISTING LETTER EFFECTS
    function startEffects() {
      const heartsContainer = document.querySelector(".hearts");

      if (heartsContainer) {
        for (let i = 0; i < 25; i++) {
          const heart = document.createElement("span");
          heart.style.left = Math.random() * 100 + "vw";
          heart.style.animationDuration = (5 + Math.random() * 5) + "s";
          heart.style.opacity = Math.random();
          heartsContainer.appendChild(heart);
        }
      }

      function heartFireworks() {
        if (!heartsContainer) return;

        setInterval(() => {
          for (let i = 0; i < 5; i++) {
            const heart = document.createElement("span");
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.width = "15px";
            heart.style.height = "15px";
            heart.style.opacity = 1;
            heart.style.background = "red";
            heart.style.transform = "rotate(45deg)";
            heart.style.position = "absolute";
            heartsContainer.appendChild(heart);

            const xMove = (Math.random() - 0.5) * 200;
            const yMove = -(50 + Math.random() * 150);

            heart.animate([
              { transform: `translate(0,0) rotate(45deg)`, opacity: 1 },
              { transform: `translate(${xMove}px, ${yMove}px) rotate(45deg)`, opacity: 0 }
            ], { duration: 1500, easing: "ease-out" });

            setTimeout(() => heart.remove(), 1500);
          }
        }, 1000);
      }

      heartFireworks();

      const letter = document.getElementById("letterBox");

      if (letter) {
        setInterval(() => {
          const sparkle = document.createElement("div");
          sparkle.classList.add("sparkle");
          sparkle.style.left = Math.random() * letter.offsetWidth + "px";
          sparkle.style.top = Math.random() * letter.offsetHeight + "px";
          letter.appendChild(sparkle);
          setTimeout(() => sparkle.remove(), 1000);
        }, 300);
      }

      const text = `
To my dearest Super Laloves, the one and only my Tia,

Happy 2nd Anniversary! Who would’ve thought we’d make it to two years? Time really flies, and every day with you feels like a… war? JOKE! Spending most of my time with you makes me so happy, and I couldn’t ask for more than being with you for the rest of my life. You’re not just my girlfriend, you’re my family, my safe place, and my best friend.

I still remember our first date, the way you talked to me, when you brought me to your dorm, and all our countless kisses. Do you still remember how we practiced our wedding? Our promises to each other, the way I kissed you as if we were in the aisle of a church… or that time when you spat your matcha on my hand! And all the nights we stayed up talking, laughing at countless jokes.

Thank you, Kristia Liejh Yap, for letting me love you and for making me feel loved and happy every single day. I’ll always be right here when you need someone, and I’ll make sure I’m the first one there whenever you need me. I’ll be the one who loves you the most, protects you, shares your struggles, and celebrates your successes. I would give up everything just to be with you and make you happy. I will continue to love you until my last breath, mi amor.
      `;

      let i = 0;

      function typeWriter() {
        if (i < text.length) {
          const el = document.getElementById("typewriter");
          el.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
          i++;
          setTimeout(typeWriter, 130);
        }
      }

      typeWriter();
    }
  </script>

</body>
</html>
